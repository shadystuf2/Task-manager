name: Release MVP

on:
  push:
    tags:
      - "mvp-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            suffix: linux-x64
            ext: ""
          - os: macos-latest
            suffix: macos-x64
            ext: ""
          - os: windows-latest
            suffix: windows-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows only)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: true

      - name: Fetch nlohmann/json header
        shell: bash
        run: |
          mkdir -p include/nlohmann
          curl -L -o include/nlohmann/json.hpp https://github.com/nlohmann/json/releases/latest/download/json.hpp

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: g++ -std=c++17 -O2 -Iinclude -o task-manager-mvp-${{ matrix.suffix }} mvp/mvp.cpp

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: g++ -std=c++17 -O2 -Iinclude -o task-manager-mvp-${{ matrix.suffix }}${{ matrix.ext }} mvp/mvp.cpp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-manager-mvp-${{ matrix.suffix }}${{ matrix.ext }}
          path: task-manager-mvp-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}